name: hza_tagger
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy>=1.24
  - scipy
  - matplotlib>=3.8
  - scikit-learn>=1.4

  # ROOT / HEP
  - uproot>=5.3
  - awkward>=2.6
  - coffea>=2024.1
  - h5py>=3.10

  # YAML / config
  - pyyaml>=6.0

  # Dask (local + HTCondor scale-out)
  - dask>=2024.1
  - distributed>=2024.1

  # Notebook
  - jupyterlab
  - ipykernel

  - pip:
    # setuptools<81 required: pkg_resources removed in 81, needed by lightning 2.2
    - setuptools<81

    # Deep learning — torch 2.2.1 is the version compatible with SALT 0.11
    # For GPU builds replace with the appropriate CUDA wheel, e.g.:
    #   pip install torch==2.2.1+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torch==2.2.1
    - torchvision==0.17.2
    - lightning==2.2.0

    # SALT runtime dependencies (also pulled in by setup_salt.sh)
    - jsonargparse>=4.18
    - atlas-ftag-tools>=0.2
    - comet_ml

    # HTCondor job submission
    - dask-jobqueue>=0.8

    # SALT itself is installed as an editable submodule — see tagger/scripts/setup_salt.sh
    # - -e tagger/salt

    # Dev / test
    - pytest>=8
    - pytest-cov
