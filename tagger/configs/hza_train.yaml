# SALT training config for the HZa binary tagger
# Run with: salt fit --config tagger/configs/hza_train.yaml
#
# Requires SALT to be checked out at tagger/salt/ (see README).
# Adjust data.train_file / val_file / test_file to your H5 paths.

name: hza_tagger

data:
  train_file:  data/train.h5
  val_file:    data/val.h5
  test_file:   data/test.h5

  # H5 dataset names — must match common/io.py
  jets_name:   jets
  tracks_name: tracks
  labels_name: labels

  # Binary label column inside the labels dataset
  label_column: a_jet
  num_classes:  2

  num_train: null   # null = use all
  num_val:   null
  num_test:  null

  # Pad/truncate tracks to this length
  num_tracks: 40

  batch_size: 1024
  num_workers: 4

model:
  name: GN2   # SALT built-in GN2-like transformer tagger

  # Jet-level input group
  jet_net:
    layers: [128, 64]
    activation: ReLU

  # Track-level transformer
  track_net:
    num_layers: 3
    num_heads:  4
    embed_dim:  128
    ffn_dim:    256
    dropout:    0.1

  # Classification head
  class_head:
    layers: [64, 32]
    activation: ReLU

  # Variable lists (defined in hza_variables.yaml)
  jet_variables:   !include hza_variables.yaml:jets
  track_variables: !include hza_variables.yaml:tracks

training:
  max_epochs:   100
  lr:           1.0e-3
  weight_decay: 1.0e-5
  scheduler:    OneCycleLR

  # Early stopping
  patience: 10

  # Checkpointing
  save_top_k: 3
  monitor:    val/auc

  # Logging
  log_every_n_steps: 50
  accelerator: auto   # "gpu" on NAF, "cpu" for local testing

preprocessing:
  norm_dict: tagger/configs/norm_dict.yaml   # generated by salt preprocess
