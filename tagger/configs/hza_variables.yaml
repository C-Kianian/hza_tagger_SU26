  common/variables.py# Variable lists for the HZa binary tagger — these are the variables to normalize
# Ensure the variables used here are stored in the h5 by jet_dumper.py and io.py!


jets:
  - name: pt
    scale: log
  - name: eta
  - name: phi
  - name: mass
    scale: log
  #- name: trk_multi

tracks:
  # Kinematic
  - name: pt
    scale: log
  - name: eta_rel
  - name: phi_rel
  - name: mass
    scale: log
  # Charge / identity
  - name: charge
  - name: pdgId
  # Impact parameters (set to 0 if absent in the input file)
  - name: dxy
    scale: tanh
  - name: dz
    scale: tanh
  - name: dxySig
    scale: tanh
  - name: dzSig
    scale: tanh
  - name: trkQuality
  - name: puppiWeight
